basePath: /
definitions:
  httpapi.cancelOrderAcceptedResponse:
    properties:
      command_id:
        type: string
      market_id:
        type: string
      message:
        type: string
      order_id:
        type: string
    type: object
  httpapi.errorResponse:
    properties:
      message:
        type: string
    type: object
  httpapi.healthResponse:
    properties:
      service:
        type: string
      status:
        type: string
    type: object
  httpapi.marketResponse:
    properties:
      market:
        $ref: '#/definitions/markets.Market'
    type: object
  httpapi.marketsResponse:
    properties:
      markets:
        items:
          $ref: '#/definitions/markets.Market'
        type: array
    type: object
  httpapi.openOrdersResponse:
    properties:
      matching_enabled:
        type: boolean
      orders:
        items:
          $ref: '#/definitions/matching.OpenOrder'
        type: array
    type: object
  httpapi.placeOrderAcceptedResponse:
    properties:
      command_id:
        type: string
      idempotency_key:
        type: string
      market_id:
        type: string
      message:
        type: string
      order_id:
        type: string
    type: object
  httpapi.positionResponse:
    properties:
      collateral_free_units:
        type: string
      collateral_locked_units:
        type: string
      market_id:
        type: string
      no_free_lots:
        type: string
      no_locked_lots:
        type: string
      wallet_address:
        type: string
      yes_free_lots:
        type: string
      yes_locked_lots:
        type: string
    type: object
  httpapi.readyResponse:
    properties:
      gateway_write_ready:
        type: boolean
      matcher:
        type: string
      pusher:
        type: string
      settlement:
        type: string
      writer:
        type: string
    type: object
  httpapi.tradesResponse:
    properties:
      matching_enabled:
        type: boolean
      trades:
        items:
          $ref: '#/definitions/matching.Trade'
        type: array
    type: object
  httpapi.walletAccountResponse:
    properties:
      collateral_free_units:
        type: string
      collateral_total_units:
        type: string
      wallet_address:
        type: string
    type: object
  markets.CreateMarketRequest:
    properties:
      category:
        type: string
      close_time:
        type: string
      collateral_mint:
        type: string
      description:
        type: string
      image_url:
        type: string
      metadata_url:
        type: string
      resolution:
        $ref: '#/definitions/markets.ResolutionConfig'
      title:
        type: string
    type: object
  markets.Market:
    properties:
      category:
        type: string
      close_time:
        type: string
      collateral_mint:
        type: string
      collateral_vault:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      image_url:
        type: string
      market_id:
        example: "0"
        type: string
      market_pda:
        type: string
      metadata_url:
        type: string
      no_mint:
        type: string
      outcome:
        $ref: '#/definitions/markets.MarketOutcome'
      resolution:
        $ref: '#/definitions/markets.ResolutionConfig'
      resolved_at:
        type: string
      status:
        $ref: '#/definitions/markets.MarketStatus'
      title:
        type: string
      updated_at:
        type: string
      yes_mint:
        type: string
    type: object
  markets.MarketOutcome:
    enum:
    - "yes"
    - "no"
    - undecided
    type: string
    x-enum-varnames:
    - MarketOutcomeYes
    - MarketOutcomeNo
    - MarketOutcomeUndecided
  markets.MarketStatus:
    enum:
    - open
    - resolved
    type: string
    x-enum-varnames:
    - MarketStatusOpen
    - MarketStatusResolved
  markets.OracleCondition:
    enum:
    - gt
    - gte
    - lt
    - lte
    type: string
    x-enum-varnames:
    - OracleConditionGT
    - OracleConditionGTE
    - OracleConditionLT
    - OracleConditionLTE
  markets.ResolutionConfig:
    properties:
      authority:
        type: string
      mode:
        $ref: '#/definitions/markets.ResolutionMode'
      oracle_condition:
        $ref: '#/definitions/markets.OracleCondition'
      oracle_feed:
        type: string
      oracle_observation_time:
        type: string
      oracle_target_price:
        type: integer
    type: object
  markets.ResolutionMode:
    enum:
    - creator
    - pyth
    type: string
    x-enum-varnames:
    - ResolutionModeCreator
    - ResolutionModePyth
  matching.OpenOrder:
    properties:
      id:
        type: string
      outcome:
        type: string
      price:
        type: string
      quantity:
        type: string
      side:
        type: string
    type: object
  matching.OrderLevel:
    properties:
      price:
        type: string
      total_volume:
        type: string
    type: object
  matching.OrderbookSnapshot:
    properties:
      asks:
        items:
          $ref: '#/definitions/matching.OrderLevel'
        type: array
      best_ask_price:
        type: string
      best_bid_price:
        type: string
      bids:
        items:
          $ref: '#/definitions/matching.OrderLevel'
        type: array
      matching_enabled:
        type: boolean
    type: object
  matching.PriceHistory:
    properties:
      points:
        items:
          $ref: '#/definitions/matching.PricePoint'
        type: array
      range:
        $ref: '#/definitions/matching.PriceHistoryRange'
    type: object
  matching.PriceHistoryRange:
    enum:
    - 1H
    - 6H
    - 1D
    - 1W
    - 1M
    - ALL
    type: string
    x-enum-varnames:
    - PriceHistoryRange1H
    - PriceHistoryRange6H
    - PriceHistoryRange1D
    - PriceHistoryRange1W
    - PriceHistoryRange1M
    - PriceHistoryRangeAll
  matching.PricePoint:
    properties:
      price:
        type: string
      quantity:
        type: string
      timestamp:
        type: string
    type: object
  matching.Trade:
    properties:
      executed_at:
        type: string
      id:
        type: string
      price:
        type: string
      quantity:
        type: string
    type: object
  orders.PlaceOrderRequest:
    properties:
      expire_time:
        description: Unix秒级时间戳 (0=GTC)
        type: integer
      market_id:
        description: 市场ID
        example: "0"
        type: string
      nonce:
        description: 防碰撞nonce (42位时间戳+22位随机数)
        example: "0"
        type: string
      order_type:
        description: '"limit" | "market"'
        type: string
      original_action:
        description: '用户原始动作: buy | sell'
        type: string
      original_outcome:
        description: '用户原始标的: yes | no'
        type: string
      original_price_tick:
        description: 用户原始价格/滑点边界
        type: integer
      price_tick:
        description: 归一化后的 1-99
        type: integer
      qty_lots:
        description: 份额 (乘100后的整数，市价买入为0)
        type: integer
      side:
        description: 归一化后的 "buy" | "sell" (只面向 YES)
        type: string
      signature:
        description: base64 Ed25519签名 (对Keccak256(Borsh(Intent))签名)
        type: string
      spend_amount:
        description: 金额 (乘100后的整数，仅市价买入有值)
        type: integer
      wallet_address:
        description: 用户钱包地址 (base58)
        type: string
    type: object
info:
  contact: {}
  description: BlinkPredict backend API documentation. Import /api/openapi.json into
    Postman or FoxAPI.
  title: BlinkPredict Banckend API
  version: v1
paths:
  /api/health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.healthResponse'
      summary: Health check
      tags:
      - System
  /api/markets:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.marketsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: List markets
      tags:
      - Markets
    post:
      consumes:
      - application/json
      parameters:
      - description: Create market payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/markets.CreateMarketRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.marketResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - PrivyToken: []
      summary: Create market
      tags:
      - Markets
  /api/markets/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.marketResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Get market
      tags:
      - Markets
  /api/orderbook/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/matching.OrderbookSnapshot'
      summary: Get orderbook
      tags:
      - Market Data
  /api/orders:
    post:
      consumes:
      - application/json
      parameters:
      - description: Place order payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/orders.PlaceOrderRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/httpapi.placeOrderAcceptedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "501":
          description: Not Implemented
          schema:
            additionalProperties: true
            type: object
      security:
      - PrivyToken: []
      summary: Place order
      tags:
      - Orders
  /api/orders/{orderId}:
    delete:
      parameters:
      - description: Order ID
        in: path
        name: orderId
        required: true
        type: string
      - description: Market ID
        in: query
        name: market_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/httpapi.cancelOrderAcceptedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "501":
          description: Not Implemented
          schema:
            additionalProperties: true
            type: object
      security:
      - PrivyToken: []
      summary: Cancel order
      tags:
      - Orders
  /api/orders/open/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.openOrdersResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - PrivyToken: []
      summary: Get current user's open orders
      tags:
      - Orders
  /api/positions/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.positionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - PrivyToken: []
      summary: Get current user's projected position
      tags:
      - Positions
  /api/price-history/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      - description: 1H|6H|1D|1W|1M|ALL
        in: query
        name: range
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/matching.PriceHistory'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Get price history
      tags:
      - Market Data
  /api/ready:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.readyResponse'
      summary: Readiness status
      tags:
      - System
  /api/trades/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.tradesResponse'
      summary: Get recent trades
      tags:
      - Market Data
  /api/wallet-account:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.walletAccountResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - PrivyToken: []
      summary: Get current user's trading account balance
      tags:
      - Positions
schemes:
- http
- https
securityDefinitions:
  PrivyToken:
    in: header
    name: privy-id-token
    type: apiKey
swagger: "2.0"
