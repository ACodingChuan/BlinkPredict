basePath: /
definitions:
  httpapi.authChallengeRequest:
    properties:
      wallet_address:
        type: string
    type: object
  httpapi.authChallengeResponse:
    properties:
      challenge_id:
        type: string
      expires_at:
        type: string
      message:
        type: string
    type: object
  httpapi.authLoginRequest:
    properties:
      challenge_id:
        type: string
      signature:
        type: string
      wallet_address:
        type: string
    type: object
  httpapi.authLoginResponse:
    properties:
      auth_token:
        type: string
      expires_at:
        type: string
      user:
        $ref: '#/definitions/httpapi.authLoginUserResponse'
    type: object
  httpapi.authLoginUserResponse:
    properties:
      isAdmin:
        type: boolean
      walletAddress:
        type: string
    type: object
  httpapi.cancelOrderAcceptedResponse:
    properties:
      command_id:
        type: string
      market_id:
        type: string
      message:
        type: string
      order_id:
        type: string
    type: object
  httpapi.errorResponse:
    properties:
      message:
        type: string
    type: object
  httpapi.healthResponse:
    properties:
      service:
        type: string
      status:
        type: string
    type: object
  httpapi.marketCreateAcceptedResponse:
    properties:
      message:
        type: string
      signature:
        type: string
      status:
        type: string
    type: object
  httpapi.marketResponse:
    properties:
      market:
        $ref: '#/definitions/markets.Market'
    type: object
  httpapi.marketsResponse:
    properties:
      markets:
        items:
          $ref: '#/definitions/markets.Market'
        type: array
    type: object
  httpapi.openOrdersResponse:
    properties:
      matching_enabled:
        type: boolean
      orders:
        items:
          $ref: '#/definitions/matching.OpenOrder'
        type: array
    type: object
  httpapi.placeOrderAcceptedResponse:
    properties:
      command_id:
        type: string
      idempotency_key:
        type: string
      market_id:
        type: string
      message:
        type: string
      order_id:
        type: string
    type: object
  httpapi.positionResponse:
    properties:
      collateral_locked_units:
        type: string
      market_id:
        type: string
      no_free_lots:
        type: string
      no_locked_lots:
        type: string
      no_pending_lots:
        type: string
      wallet_address:
        type: string
      yes_free_lots:
        type: string
      yes_locked_lots:
        type: string
      yes_pending_lots:
        type: string
    type: object
  httpapi.readyResponse:
    properties:
      gateway_write_ready:
        type: boolean
      matcher:
        type: string
      pusher:
        type: string
      settlement:
        type: string
      writer:
        type: string
    type: object
  httpapi.tradesResponse:
    properties:
      matching_enabled:
        type: boolean
      trades:
        items:
          $ref: '#/definitions/matching.Trade'
        type: array
    type: object
  httpapi.walletAccountResponse:
    properties:
      collateral_free_units:
        type: string
      collateral_locked_units:
        type: string
      collateral_pending_units:
        type: string
      collateral_total_units:
        type: string
      wallet_address:
        type: string
    type: object
  markets.CreateMarketRequest:
    properties:
      signature:
        type: string
    type: object
  markets.Market:
    properties:
      category:
        type: string
      claim_deadline_time:
        type: string
      close_time:
        type: string
      collateral_mint:
        type: string
      created_at:
        type: string
      creator_unclaimed_fee:
        type: integer
      description:
        type: string
      id:
        type: string
      image_url:
        type: string
      market_id:
        example: "0"
        type: string
      market_pda:
        type: string
      metadata_cid:
        type: string
      metadata_url:
        type: string
      outcome:
        $ref: '#/definitions/markets.MarketOutcome'
      platform_unclaimed_fee:
        type: integer
      resolution:
        $ref: '#/definitions/markets.ResolutionConfig'
      resolve_after_time:
        type: string
      resolved_at:
        type: string
      status:
        $ref: '#/definitions/markets.MarketStatus'
      title:
        type: string
      updated_at:
        type: string
    type: object
  markets.MarketOutcome:
    enum:
    - "yes"
    - "no"
    - undecided
    type: string
    x-enum-varnames:
    - MarketOutcomeYes
    - MarketOutcomeNo
    - MarketOutcomeUndecided
  markets.MarketStatus:
    enum:
    - open
    - resolved
    type: string
    x-enum-varnames:
    - MarketStatusOpen
    - MarketStatusResolved
  markets.OracleCondition:
    enum:
    - gt
    - gte
    - lt
    - lte
    type: string
    x-enum-varnames:
    - OracleConditionGT
    - OracleConditionGTE
    - OracleConditionLT
    - OracleConditionLTE
  markets.ResolutionConfig:
    properties:
      authority:
        type: string
      mode:
        $ref: '#/definitions/markets.ResolutionMode'
      oracle_condition:
        $ref: '#/definitions/markets.OracleCondition'
      oracle_feed:
        type: string
      oracle_target_expo:
        type: integer
      oracle_target_price:
        type: integer
    type: object
  markets.ResolutionMode:
    enum:
    - creator
    - pyth
    type: string
    x-enum-varnames:
    - ResolutionModeCreator
    - ResolutionModePyth
  matching.OpenOrder:
    properties:
      id:
        type: string
      outcome:
        type: string
      price:
        type: string
      quantity:
        type: string
      side:
        type: string
      status:
        type: string
    type: object
  matching.OrderLevel:
    properties:
      price:
        type: string
      total_volume:
        type: string
    type: object
  matching.OrderbookSnapshot:
    properties:
      asks:
        items:
          $ref: '#/definitions/matching.OrderLevel'
        type: array
      best_ask_price:
        type: string
      best_bid_price:
        type: string
      bids:
        items:
          $ref: '#/definitions/matching.OrderLevel'
        type: array
      matching_enabled:
        type: boolean
    type: object
  matching.PriceHistory:
    properties:
      points:
        items:
          $ref: '#/definitions/matching.PricePoint'
        type: array
      range:
        $ref: '#/definitions/matching.PriceHistoryRange'
    type: object
  matching.PriceHistoryRange:
    enum:
    - 1H
    - 6H
    - 1D
    - 1W
    - 1M
    - ALL
    type: string
    x-enum-varnames:
    - PriceHistoryRange1H
    - PriceHistoryRange6H
    - PriceHistoryRange1D
    - PriceHistoryRange1W
    - PriceHistoryRange1M
    - PriceHistoryRangeAll
  matching.PricePoint:
    properties:
      price:
        type: string
      quantity:
        type: string
      timestamp:
        type: string
    type: object
  matching.Trade:
    properties:
      executed_at:
        type: string
      id:
        type: string
      price:
        type: string
      quantity:
        type: string
    type: object
  orders.PlaceOrderRequest:
    properties:
      expiry_ts:
        type: integer
      limit_price:
        type: integer
      market:
        type: string
      nonce:
        example: "0"
        type: string
      order_type:
        type: string
      outcome:
        type: string
      program_id:
        type: string
      side:
        type: string
      signature:
        type: string
      total_amount:
        type: integer
      user:
        type: string
      version:
        type: integer
    type: object
info:
  contact: {}
  description: BlinkPredict backend API documentation. Import /api/openapi.json into
    Postman or FoxAPI.
  title: BlinkPredict Banckend API
  version: v1
paths:
  /api/auth/challenge:
    post:
      consumes:
      - application/json
      parameters:
      - description: Challenge request payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.authChallengeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.authChallengeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Create auth challenge
      tags:
      - Auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login request payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.authLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.authLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Login with signed challenge
      tags:
      - Auth
  /api/health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.healthResponse'
      summary: Health check
      tags:
      - System
  /api/markets:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.marketsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: List markets
      tags:
      - Markets
    post:
      consumes:
      - application/json
      parameters:
      - description: Create market payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/markets.CreateMarketRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/httpapi.marketCreateAcceptedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Create market
      tags:
      - Markets
  /api/markets/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.marketResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Get market
      tags:
      - Markets
  /api/orderbook/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/matching.OrderbookSnapshot'
      summary: Get orderbook
      tags:
      - Market Data
  /api/orders:
    post:
      consumes:
      - application/json
      parameters:
      - description: Place order payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/orders.PlaceOrderRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/httpapi.placeOrderAcceptedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "501":
          description: Not Implemented
          schema:
            additionalProperties: true
            type: object
      summary: Place order
      tags:
      - Orders
  /api/orders/{orderId}:
    delete:
      parameters:
      - description: Order ID
        in: path
        name: orderId
        required: true
        type: string
      - description: Market ID
        in: query
        name: market_id
        required: true
        type: string
      - description: Wallet address when auth is disabled
        in: query
        name: wallet_address
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/httpapi.cancelOrderAcceptedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "501":
          description: Not Implemented
          schema:
            additionalProperties: true
            type: object
      summary: Cancel order
      tags:
      - Orders
  /api/orders/open/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      - description: Wallet address when auth is disabled
        in: query
        name: wallet_address
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.openOrdersResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Get current user's open orders
      tags:
      - Orders
  /api/positions/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      - description: Wallet address when auth is disabled
        in: query
        name: wallet_address
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.positionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Get current user's projected position
      tags:
      - Positions
  /api/price-history/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      - description: 1H|6H|1D|1W|1M|ALL
        in: query
        name: range
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/matching.PriceHistory'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Get price history
      tags:
      - Market Data
  /api/ready:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.readyResponse'
      summary: Readiness status
      tags:
      - System
  /api/trades/{marketId}:
    get:
      parameters:
      - description: Market ID
        in: path
        name: marketId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.tradesResponse'
      summary: Get recent trades
      tags:
      - Market Data
  /api/wallet-account:
    get:
      parameters:
      - description: Wallet address when auth is disabled
        in: query
        name: wallet_address
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.walletAccountResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Get current user's trading account balance
      tags:
      - Positions
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
